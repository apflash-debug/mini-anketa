<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мини-анкета</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        .question { margin: 20px 0; }
        input { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-top: 20px; padding: 10px 30px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #45a049; }
        #thank-you { display: none; color: green; font-size: 24px; margin-top: 30px; }
    </style>
</head>
<body>
    <h1>Мини-анкета</h1>
    <div id="questions-container"></div>
    <button onclick="submitAnswers()">Отправить</button>
    <div id="thank-you">Спасибо! 🎉</div>

    <script>
        let questions = [];

        async function loadQuestions() {
            const response = await fetch("http://localhost:8000/questions");
            questions = await response.json();

            const container = document.getElementById("questions-container");
            questions.forEach(q => {
                container.innerHTML += `
                    <div class="question">
                        <label>${q.text}</label>
                        <input type="text" id="answer-${q.id}" placeholder="Ваш ответ...">
                    </div>`;
            });
        }

        async function submitAnswers() {
            const answers = questions.map(q => ({
                question_id: q.id,
                question: q.text,
                answer: document.getElementById("answer-" + q.id).value
            }));

            await fetch("http://localhost:8000/answers", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ answers: answers })
            });

            document.getElementById("thank-you").style.display = "block";
        }

        loadQuestions();
    </script>
</body>
</html>
